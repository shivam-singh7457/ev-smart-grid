version: '3.8'

services:
  # --- ZOOKEEPER: The Distributed Coordinator ---
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: bds_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # --- APACHE KAFKA: The High-Velocity Message Broker ---
  # BDS Flex: This isolates the edge IoT devices from the processing layer,
  # preventing system crashes during massive traffic anomalies.
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: bds_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_MESSAGE_MAX_BYTES: 5242880           # 5MB — model weights are ~1.4MB
      KAFKA_MAX_REQUEST_SIZE: 5242880
      KAFKA_REPLICA_FETCH_MAX_BYTES: 5242880

  # --- MONGODB: The NoSQL Sink ---
  # BDS Flex: Capable of handling massive, unstructured JSON writes from Spark.
  mongodb:
    image: mongo:6.0
    container_name: bds_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: